<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Navy background -->
  <rect width="192" height="192" rx="28" fill="#1a2f6b"/>

  <!-- BrackenfellGas accurate flame - centred in icon -->
  <!-- Scaled from 120x100 viewBox to sit nicely in 192x192 -->
  <g transform="translate(28, 22) scale(1.15)">
    <defs>
      <linearGradient id="iB" x1="100" y1="2" x2="8" y2="92" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#00e8f8"/>
        <stop offset="20%"  stop-color="#18b9e6"/>
        <stop offset="55%"  stop-color="#1255b0"/>
        <stop offset="100%" stop-color="#0a1e6e"/>
      </linearGradient>
      <linearGradient id="iO" x1="8" y1="88" x2="72" y2="22" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#b71c1c"/>
        <stop offset="40%"  stop-color="#e64a19"/>
        <stop offset="100%" stop-color="#ff7043"/>
      </linearGradient>
      <linearGradient id="iG" x1="16" y1="82" x2="60" y2="30" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#bf360c"/>
        <stop offset="100%" stop-color="#ffca28"/>
      </linearGradient>
      <filter id="iF" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- Outer blue/cyan wing -->
    <path d="M 14 92 C 2 78 0 58 6 40 C 13 20 30 6 46 -2 C 55 -6 66 -6 72 -1 C 80 5 74 20 66 32 C 58 46 57 60 67 70 C 79 82 98 80 108 65 C 114 56 116 42 110 28 C 116 38 120 54 116 68 C 109 87 92 98 75 104 C 61 109 48 112 42 100 C 32 102 18 104 14 92 Z"
          fill="url(#iB)" filter="url(#iF)"/>
    <!-- Orange inner sweep -->
    <path d="M 22 90 C 12 76 10 58 16 42 C 22 28 38 16 50 8 C 54 18 50 34 50 48 C 50 62 57 73 68 77 C 58 86 46 92 42 100 C 36 100 26 94 22 90 Z"
          fill="url(#iO)"/>
    <!-- Gold inner curl -->
    <path d="M 32 88 C 24 76 24 60 30 48 C 35 38 44 32 50 24 C 52 34 50 46 53 58 C 55 68 63 73 70 68 C 65 79 56 87 50 94 C 44 96 34 92 32 88 Z"
          fill="url(#iG)"/>
  </g>

  <!-- "BG" text at bottom -->
  <text x="96" y="178" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="26" fill="white" text-anchor="middle" letter-spacing="2">BG</text>
</svg>
